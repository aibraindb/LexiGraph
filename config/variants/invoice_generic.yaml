variant_id: invoice_generic
doc_type: invoice
identify:
  anchors_any_of: ["INVOICE", "Invoice #", "Invoice Number", "Balance Due"]
extract:
  fields:
    agreement_type: {strategy: literal, value: "Invoice"}
    agreement_date:
      strategy: regex
      patterns:
        - '(Invoice Date)[:\s]*([0-9]{1,2}/[0-9]{1,2}/[0-9]{2,4})'
    total_amount:
      strategy: regex
      patterns:
        - '(Balance Due|Total Due|Amount Due)[:\s]*\$?([0-9,]+\.[0-9]{2})'
