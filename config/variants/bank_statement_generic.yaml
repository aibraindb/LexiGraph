variant_id: bank_statement_generic
doc_type: bank_statement
identify:
  anchors_any_of: ["Account Summary", "Statement Period", "Beginning Balance", "Ending Balance"]
  negative_anchors: ["Invoice", "Lease Agreement"]
  page_scope: 1
extract:
  fields:
    statement_period:
      strategy: regex
      patterns:
        - 'Statement Period[:\s]*([A-Za-z0-9\-\/ ]+)'
