variant_id: loan_generic
doc_type: loan_agreement
identify:
  anchors_any_of: ["Loan Agreement", "Promissory Note", "APR", "Finance Charge"]
extract:
  fields:
    agreement_type: {strategy: literal, value: "Loan Agreement"}
    agreement_date:
      strategy: regex
      patterns:
        - '(Date|Dated)[:\s]+([0-9]{1,2}/[0-9]{1,2}/[0-9]{2,4})'
    total_amount:
      strategy: regex
      patterns:
        - '(Amount Financed|Principal|Loan Amount)[:\s]*\$?([0-9,]+\.[0-9]{2})'
