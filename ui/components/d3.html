<!DOCTYPE html>
<meta charset="utf-8" />
<style>
  body { font: 12px system-ui, sans-serif; margin: 0; }
  .label { pointer-events: none; font-size: 11px; }
  .edge { stroke: #aaa; stroke-opacity: 0.7; }
  .node { fill: #4f83ff; stroke: #fff; stroke-width: 1.5px; cursor: grab; }
  .node:hover { fill: #2d5bd1; }
  .edge-label { fill: #555; font-size: 10px; }
</style>

<svg id="viz" width="100%" height="600"></svg>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
/*__GRAPH_DATA__*/  // streamlit replaces this with: window.GRAPH = {...};

(function(){
  const graph = (window && window.GRAPH) ? window.GRAPH : {nodes:[], links:[]};

  const svg = d3.select("#viz");
  const { width, height } = svg.node().getBoundingClientRect();
  const g = svg.append("g");

  const zoom = d3.zoom().scaleExtent([0.3, 3]).on("zoom", (e)=>g.attr("transform", e.transform));
  svg.call(zoom);

  svg.append("defs").append("marker")
      .attr("id", "arrow").attr("viewBox", "0 -5 10 10").attr("refX", 15).attr("refY", 0)
      .attr("markerWidth", 6).attr("markerHeight", 6).attr("orient", "auto")
    .append("path").attr("d", "M0,-5L10,0L0,5").attr("fill", "#aaa");

  const link = g.append("g").attr("stroke", "#aaa").attr("stroke-opacity", 0.7)
    .selectAll("line").data(graph.links || []).join("line")
      .attr("class", "edge").attr("marker-end", "url(#arrow)");

  const edgeLabel = g.append("g").selectAll("text").data(graph.links || []).join("text")
      .attr("class", "edge-label").text(d => d.label || "");

  const node = g.append("g").selectAll("circle").data(graph.nodes || []).join("circle")
      .attr("class", "node").attr("r", 10)
      .call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended));

  const label = g.append("g").selectAll("text").data(graph.nodes || []).join("text")
      .attr("class", "label").attr("dy", "-0.9em").text(d => d.label || d.id);

  const sim = d3.forceSimulation(graph.nodes)
    .force("link", d3.forceLink(graph.links).id(d => d.id).distance(120).strength(0.2))
    .force("charge", d3.forceManyBody().strength(-250))
    .force("center", d3.forceCenter(width/2, height/2))
    .on("tick", ticked);

  function ticked() {
    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    edgeLabel.attr("x", d => (d.source.x + d.target.x) / 2)
             .attr("y", d => (d.source.y + d.target.y) / 2);
    node.attr("cx", d => d.x).attr("cy", d => d.y);
    label.attr("x", d => d.x).attr("y", d => d.y);
  }

  function dragstarted(event, d) { if (!event.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
  function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
  function dragended(event, d) { if (!event.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }
})();
</script>
